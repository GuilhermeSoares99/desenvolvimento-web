<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Interativa Personalizada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
            background-color: #f5f5f5;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #333;
            color: white;
        }
        #mensagem {
            font-size: 18px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .highlight {
            color: blue;
            font-weight: bold;
        }
        #minhaImg {
            width: 200px;
            margin-top: 20px;
            display: none; /* começa escondida */
            transition: transform 0.3s;
        }
        #campoTexto {
            padding: 5px;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Interatividade Avançada com JavaScript</h1>
    
    <button id="btnClique">Clique aqui</button>
    <button id="btnReset">Resetar</button>
    
    <p id="mensagem">Mensagem inicial</p>
    
    <input type="text" id="campoTexto" placeholder="Digite algo...">
    <p id="eco"></p>

    <img id="minhaImg" src="https://via.placeholder.com/200" alt="Imagem de exemplo">

    <script>
        // Seleção de elementos
        const btnClique = document.getElementById("btnClique");
        const btnReset = document.getElementById("btnReset");
        const mensagem = document.getElementById("mensagem");
        const campoTexto = document.getElementById("campoTexto");
        const eco = document.getElementById("eco");
        const img = document.getElementById("minhaImg");

        // Clique simples: muda mensagem e cor
        btnClique.addEventListener("click", () => {
            mensagem.textContent = "Você clicou no botão!";
            mensagem.classList.add("highlight");
            mensagem.style.color = "green";
        });

        // Duplo clique: muda mensagem, cor e mostra imagem
        btnClique.addEventListener("dblclick", () => {
            mensagem.textContent = "Duplo clique detectado!";
            mensagem.style.color = "purple";
            mensagem.style.fontSize = "22px";
            img.style.display = img.style.display === "none" ? "block" : "none";
            img.style.transform = "rotate(10deg)";
        });

        // Mouseover: mensagem temporária
        btnClique.addEventListener("mouseover", () => {
            mensagem.textContent = "O mouse passou sobre o botão!";
            mensagem.style.color = "orange";
        });

        // Reset: volta ao estado inicial
        btnReset.addEventListener("click", () => {
            mensagem.textContent = "Mensagem inicial";
            mensagem.classList.remove("highlight");
            mensagem.style.color = "#000";
            mensagem.style.fontSize = "18px";
            eco.textContent = "";
            campoTexto.value = "";
            img.style.display = "none";
        });

        // Teclado: keyup eco e keydown altera cor de fundo
        campoTexto.addEventListener("keyup", () => {
            eco.textContent = "Você digitou: " + campoTexto.value;
        });

        campoTexto.addEventListener("keydown", (e) => {
            if(e.key === "Enter") {
                document.body.style.backgroundColor = "#d0f0c0"; // muda fundo ao pressionar Enter
            } else {
                document.body.style.backgroundColor = "#f5f5f5"; // mantém padrão
            }
        });

    </script>
</body>
</html>
